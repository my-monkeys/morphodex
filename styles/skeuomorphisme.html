<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nimbus · Skeuomorphisme — Morphodex</title>
  <link rel="stylesheet" href="../assets/landing-base.css" />
  <link rel="stylesheet" href="../assets/hud.css" />
  <style>
    /* ====== PEAU : SKEUOMORPHISME ======
       L'écran imite la matière : feutrine, métal brossé, cuir,
       verre brillant. Reliefs, biseaux, reflets, coutures. */
    body {
      font-family: "Lucida Grande", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: #f1ece0;
      background: #3c6b50;
      background-image: radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px), linear-gradient(#3f7053, #2c5440);
      background-size: 4px 4px, cover;
    }
    .bg { display: none; }
    .text-dark { color: #2c2f35; }

    .surface { background: linear-gradient(#fcfcf9, #e3e5e0); border: 1px solid #b3b6ae; color: #2c2f35; box-shadow: inset 0 1px 0 #fff, 0 5px 12px rgba(0,0,0,.4); }

    /* Nav alu brossé */
    .nav { padding: 10px 12px 10px 18px; border-radius: 13px; background: linear-gradient(#fbfbfc, #c6c9cf 48%, #b6bac0 52%, #d4d7dc); border-color: #8d9098; box-shadow: inset 0 1px 0 rgba(255,255,255,.8), 0 2px 6px rgba(0,0,0,.45); }
    .brand { font-weight: 700; font-size: 19px; color: #333; text-shadow: 0 1px 0 #fff; }
    .brand-logo { width: 34px; height: 34px; border-radius: 8px; font-size: 17px; color: #fff; background: linear-gradient(#8fc1f3, #2f6fc4); border: 1px solid #235ba6; box-shadow: inset 0 1px 1px rgba(255,255,255,.8), inset 0 -6px 8px rgba(0,0,0,.2), 0 1px 2px rgba(0,0,0,.4); text-shadow: 0 -1px 0 rgba(0,0,0,.4); }
    .nav-links a { color: #3a3a3a; font-size: 13px; font-weight: 600; padding: 7px 12px; border-radius: 6px; text-shadow: 0 1px 0 #fff; }
    .nav-links a:hover { background: rgba(255,255,255,.5); box-shadow: inset 0 1px 2px rgba(0,0,0,.15); }

    .btn { font-weight: 700; font-size: 14px; color: #fff; text-shadow: 0 -1px 0 rgba(0,0,0,.35); padding: 12px 22px; border-radius: 9px; background: linear-gradient(#62a3ee, #2f6fc4 52%, #205aa8); border: 1px solid #234f8f; box-shadow: inset 0 1px 0 rgba(255,255,255,.7), inset 0 -8px 10px rgba(0,0,0,.18), 0 2px 3px rgba(0,0,0,.4); }
    .btn:active { box-shadow: inset 0 2px 5px rgba(0,0,0,.5); }
    .btn-primary { background: linear-gradient(#7ec46a, #3f9a3f 52%, #2f8030); border-color: #2c6e2c; }
    .nav-cta { padding: 8px 16px; font-size: 13px; }
    .btn[class~="btn"]:not(.btn-primary):not(.nav-cta) { color: #34526f; text-shadow: 0 1px 0 rgba(255,255,255,.7); background: linear-gradient(#fdfdfe, #d2d6dc); border: 1px solid #9aa0a8; box-shadow: inset 0 1px 0 #fff, 0 2px 3px rgba(0,0,0,.3); }

    .eyebrow { font-size: 12px; font-weight: 700; color: #fff; text-shadow: 0 -1px 0 rgba(0,0,0,.4); padding: 6px 14px; border-radius: 999px; background: linear-gradient(#ffb24d, #e8821c); border: 1px solid #c46a12; box-shadow: inset 0 1px 0 rgba(255,255,255,.6), 0 2px 4px rgba(0,0,0,.35); }
    .eyebrow .ic { color: #fff; }
    .hero-title { color: #f4f1e8; text-shadow: 0 1px 0 rgba(255,255,255,.18), 0 2px 5px rgba(0,0,0,.5); }
    .accent { color: #ffe6a8; }
    .hero-sub, .section-sub { color: #e3e8e1; text-shadow: 0 1px 2px rgba(0,0,0,.4); }
    .hero-trust { color: #e3e8e1; text-shadow: 0 1px 2px rgba(0,0,0,.4); font-size: 14px; }
    .stars .ic { fill: #ffd34d; stroke: #c9920f; }

    .appwin { border-radius: 16px; background: linear-gradient(#6b4a2e, #45301a); border: 1px solid #2e1d0d; box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 16px 36px rgba(0,0,0,.55); padding: 0; }
    .appbar { background: linear-gradient(#fbfbfc, #cfd2d7); border-bottom: 1px solid #aeb1b7; }
    .appbar-dot { background: radial-gradient(circle at 35% 30%, #fff, #b9bcc2); box-shadow: inset 0 0 1px rgba(0,0,0,.4); }
    .app-addr { font-size: 12px; color: #5a5f66; text-shadow: 0 1px 0 #fff; }
    .appbody { background: linear-gradient(#fdfdfb, #ececea); border-radius: 0 0 14px 14px; }
    .app-side { border-right: 1px solid #d6d6d2; }
    .app-side a { color: #4a4a4a; font-size: 12.5px; border-radius: 6px; }
    .app-side a.on { background: linear-gradient(#dfe7f4, #c4d3ea); box-shadow: inset 0 1px 0 #fff, inset 0 -1px 2px rgba(0,0,0,.1); color: #1f3c66; }
    .app-note { background: linear-gradient(#fffef4, #fbf3cf); border: 1px solid #e6d792; border-radius: 6px; box-shadow: 0 3px 6px rgba(0,0,0,.2), inset 0 1px 0 #fff; }
    .app-note[data-tag]::before { content: attr(data-tag); display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px; background: #6b5b1f; color: #fff; margin-bottom: 6px; }
    .app-note-title { font-size: 13px; font-weight: 700; color: #6b5b1f; margin-bottom: 3px; }
    .app-note-text { font-size: 11.5px; color: #7a6a30; }
    .app-graph .edge { stroke: #b9a96a; opacity: 1; } .app-graph .node { fill: #6b5b1f; }

    .trustbar-label { color: #d6ddd4; text-shadow: 0 1px 1px rgba(0,0,0,.4); font-size: 12px; letter-spacing: .1em; text-transform: uppercase; }
    .trust-logos b { color: #e7ecdf; text-shadow: 0 1px 2px rgba(0,0,0,.45); font-size: 19px; font-weight: 700; }

    .section-kicker { color: #ffe6a8; text-shadow: 0 1px 2px rgba(0,0,0,.4); }
    .section-title { color: #f4f1e8; text-shadow: 0 2px 4px rgba(0,0,0,.5); }

    .feature { border-radius: 14px; padding: 28px 24px; }
    .feature-icon { width: 56px; height: 56px; border-radius: 13px; font-size: 24px; color: #fff; margin-bottom: 18px; background: linear-gradient(#6fb0f2, #2f6fc4); border: 1px solid #2459a0; box-shadow: inset 0 1px 1px rgba(255,255,255,.8), inset 0 -7px 9px rgba(0,0,0,.25), 0 2px 4px rgba(0,0,0,.35); }
    .feature-title { font-size: 19px; font-weight: 700; color: #2e2e2e; text-shadow: 0 1px 0 #fff; margin-bottom: 8px; }
    .feature-text { font-size: 14.5px; color: #555; }

    .spotlight { border-radius: 16px; padding: 38px; }
    .spotlight-title { font-weight: 700; color: #2e2e2e; text-shadow: 0 1px 0 #fff; margin-bottom: 14px; }
    .spotlight-text { color: #555; margin-bottom: 20px; font-size: 16px; }
    .checks li { color: #444; font-size: 15px; } .checks .ic { color: #3f9a3f; }
    .spotlight-visual { border-radius: 12px; background: linear-gradient(#fdfdfb, #e9eae6); border: 1px solid #c9cac6; box-shadow: inset 0 2px 5px rgba(0,0,0,.18); }
    .spotlight-visual .edge { stroke: #9aa6b8; }
    .node-a { fill: #5a9be8; } .node-b { fill: #2f6fc4; } .node-c { fill: #3f9a3f; } .node-d { fill: #e8821c; } .node-e { fill: #c44; }

    .step { border-radius: 14px; padding: 28px 24px; }
    .step-num { font-size: 12px; font-weight: 700; letter-spacing: .08em; color: #2f6fc4; text-shadow: 0 1px 0 #fff; }
    .step-icon { width: 50px; height: 50px; border-radius: 12px; font-size: 22px; color: #fff; margin: 16px 0 14px; background: linear-gradient(#6fb0f2, #2f6fc4); border: 1px solid #2459a0; box-shadow: inset 0 1px 1px rgba(255,255,255,.8), inset 0 -6px 8px rgba(0,0,0,.25); }
    .step-title { font-size: 19px; font-weight: 700; color: #2e2e2e; text-shadow: 0 1px 0 #fff; margin-bottom: 8px; }
    .step-text { font-size: 14.5px; color: #555; }

    .stats { border-radius: 16px; padding: 30px; background: linear-gradient(#fafbfc, #c2c5cc 50%, #aeb2b9 51%, #d4d7dc); border-color: #9398a0; }
    .stat-num { font-weight: 700; color: #2f6fc4; text-shadow: 0 1px 0 #fff; }
    .stat-label { font-size: 13px; color: #555; text-shadow: 0 1px 0 #fff; }
    .stat + .stat { border-left: 1px solid rgba(0,0,0,.18); box-shadow: -1px 0 0 rgba(255,255,255,.7); }

    .quote { border-radius: 16px; padding: 44px; background: linear-gradient(#fcfcf9, #e3e5e0); }
    .quote-text { color: #3a3a3a; font-weight: 400; }
    .quote-text .accent { color: #2f6fc4; }
    .quote-avatar { background: linear-gradient(#8fc1f3, #2f6fc4); border: 1px solid #235ba6; box-shadow: inset 0 1px 1px rgba(255,255,255,.7); }
    .quote-name { font-size: 15px; color: #2e2e2e; font-weight: 700; } .quote-role { font-size: 13px; color: #666; }

    .cta { border-radius: 18px; padding: 56px 30px; background: linear-gradient(#6b4a2e, #45301a); border: 1px solid #2e1d0d; box-shadow: inset 0 1px 0 rgba(255,255,255,.16), 0 14px 30px rgba(0,0,0,.5); position: relative; }
    .cta::before { content: ""; position: absolute; inset: 10px; border-radius: 12px; border: 2px dashed rgba(255,220,170,.35); pointer-events: none; }
    .cta-title { color: #f7f1e6; text-shadow: 0 2px 4px rgba(0,0,0,.6); }
    .cta-text { color: #e9ddc7; }

    .site-footer { margin-top: 50px; }
    .foot-brand .brand { color: #f1ece0; text-shadow: 0 1px 2px rgba(0,0,0,.4); margin-bottom: 12px; }
    .foot-tagline { color: #d6ddd4; text-shadow: 0 1px 1px rgba(0,0,0,.4); font-size: 14px; max-width: 240px; }
    .foot-col h6 { color: #e7ecdf; text-shadow: 0 1px 1px rgba(0,0,0,.4); font-size: 12px; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 14px; }
    .foot-col a { color: #cdd6c8; text-shadow: 0 1px 1px rgba(0,0,0,.35); font-size: 14.5px; margin-bottom: 10px; }
    .foot-col a:hover { color: #fff; }
    .foot-bottom { color: #c2cabd; text-shadow: 0 1px 1px rgba(0,0,0,.4); font-size: 13px; margin-top: 30px; }
  </style>
  <script defer src="https://uuu.my-monkey.fr/u.js" data-website-id="6c86cae6-7768-440f-84f7-309411fe825c"></script>
</head>
<body data-style="skeuomorphisme">
  <script src="../assets/landing.js"></script>
  <script src="../assets/styles-data.js"></script>
  <script src="../assets/hud.js"></script>
</body>
</html>

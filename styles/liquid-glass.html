<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nimbus · Liquid Glass — Morphodex</title>
  <link rel="stylesheet" href="../assets/landing-base.css" />
  <link rel="stylesheet" href="../assets/hud.css" />
  <style>
    /* ====== PEAU : LIQUID GLASS (Apple, 2025) ======
       Verre dépoli posé sur un fond coloré qui coule en continu.
       Liseré lumineux, halos lents — rien ne clignote. */
    :root { --txt: #eef2ff; --dim: rgba(238,242,255,.72); --line: rgba(255,255,255,.16); }
    html { scroll-behavior: smooth; }
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif; color: var(--txt); background: #0b0a1c; }

    /* Fond vivant continu sur toute la hauteur */
    .bg { background: linear-gradient(180deg, #0b0a1c 0%, #141235 24%, #0e0c26 50%, #15113a 74%, #0b0a1c 100%); }
    .bg span { border-radius: 50%; filter: blur(120px); opacity: .44; mix-blend-mode: screen; }
    .bg-1 { width: 72vw; height: 72vw; background: radial-gradient(circle, #4f7bff, transparent 60%); top: -8%; left: -18%; animation: drift1 64s ease-in-out infinite; }
    .bg-2 { width: 62vw; height: 62vw; background: radial-gradient(circle, #b06bff, transparent 60%); top: 42%; right: -20%; animation: drift2 78s ease-in-out infinite; }
    .bg-3 { width: 66vw; height: 66vw; background: radial-gradient(circle, #18b8c8, transparent 60%); top: 80%; left: -14%; animation: drift1 70s ease-in-out infinite reverse; }
    @keyframes drift1 { 50% { transform: translate(7vw, 4vh) scale(1.07); } }
    @keyframes drift2 { 50% { transform: translate(-6vw, 5vh) scale(1.05); } }

    /* Matériau verre */
    .surface {
      position: relative;
      background: linear-gradient(150deg, rgba(255,255,255,.11), rgba(255,255,255,.035));
      -webkit-backdrop-filter: blur(20px) saturate(150%) brightness(1.03);
      backdrop-filter: blur(20px) saturate(150%) brightness(1.03);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: inset 0 1.5px 0 rgba(255,255,255,.45), inset 0 -22px 44px rgba(120,170,255,.08), 0 18px 46px rgba(0,0,0,.38);
    }

    .nav { padding: 11px 12px 11px 22px; border-radius: 999px; }
    .brand { font-weight: 600; font-size: 19px; letter-spacing: -.01em; }
    .brand-logo { width: 36px; height: 36px; border-radius: 50%; font-size: 19px; background: linear-gradient(160deg, rgba(255,255,255,.5), rgba(120,150,255,.25)); border: 1px solid rgba(255,255,255,.5); box-shadow: inset 0 1px 0 rgba(255,255,255,.8); }
    .nav-links a { color: var(--dim); font-size: 14.5px; font-weight: 500; padding: 9px 16px; border-radius: 999px; transition: color .15s, background .15s; }
    .nav-links a:hover { color: #fff; background: rgba(255,255,255,.12); }

    .btn { font-weight: 600; font-size: 15px; color: #fff; padding: 13px 24px; border-radius: 999px; border: 1px solid rgba(255,255,255,.32); background: linear-gradient(135deg, rgba(255,255,255,.26), rgba(255,255,255,.08)); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px); box-shadow: inset 0 1px 0 rgba(255,255,255,.6), 0 8px 22px rgba(0,0,0,.35); transition: transform .15s; }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary { background: linear-gradient(135deg, rgba(90,170,255,.62), rgba(170,107,255,.55)); border-color: rgba(255,255,255,.5); }
    .nav-cta { padding: 10px 18px; }
    .btn .ic { font-size: 17px; }

    .eyebrow { font-size: 13px; font-weight: 600; padding: 9px 16px 9px 12px; border-radius: 999px; color: #dfe6ff; }
    .eyebrow .ic { font-size: 16px; color: #b9d0ff; }
    .hero-title { font-weight: 600; margin-bottom: 22px; text-shadow: 0 4px 50px rgba(120,170,255,.35); }
    .accent { background: linear-gradient(110deg, #9fd0ff, #d7b4ff 55%, #ffc4ec); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .hero-sub { color: var(--dim); margin-bottom: 30px; }
    .hero-actions { margin-bottom: 26px; }
    .hero-trust { font-size: 13.5px; color: var(--dim); }
    .stars .ic { font-size: 15px; fill: #ffd479; stroke: #ffd479; }

    .appwin { border-radius: 22px; }
    .appbar { border-bottom: 1px solid var(--line); }
    .appbar-dot { background: rgba(255,255,255,.3); }
    .app-addr { font-size: 12px; color: var(--dim); }
    .app-side { border-right: 1px solid var(--line); }
    .app-side a { border-radius: 10px; font-size: 12.5px; color: var(--dim); }
    .app-side a.on { background: rgba(255,255,255,.16); color: #fff; }
    .app-side a .ic { font-size: 15px; }
    .app-note { background: rgba(255,255,255,.1); border: 1px solid var(--line); border-radius: 13px; padding: 11px 13px; }
    .app-note[data-tag]::before { content: attr(data-tag); display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 999px; background: rgba(140,170,255,.3); color: #d8e4ff; margin-bottom: 7px; }
    .app-note-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .app-note-text { font-size: 11.5px; color: var(--dim); line-height: 1.4; }
    .app-graph .edge { stroke: rgba(170,200,255,.8); opacity: 1; } .app-graph .node { fill: #bcd4ff; }

    .trustbar-label { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--dim); }
    .trust-logos b { font-size: 19px; font-weight: 600; letter-spacing: -.01em; color: rgba(255,255,255,.55); }

    .section-kicker { font-weight: 600; color: #b9d0ff; }
    .section-title { font-weight: 600; }
    .section-sub { color: var(--dim); }

    .feature { border-radius: 24px; padding: 32px 28px; }
    .feature-icon { width: 56px; height: 56px; border-radius: 16px; font-size: 26px; margin-bottom: 22px; background: linear-gradient(160deg, rgba(255,255,255,.32), rgba(150,170,255,.14)); border: 1px solid rgba(255,255,255,.4); box-shadow: inset 0 1px 0 rgba(255,255,255,.6); }
    .feature-title { font-weight: 600; margin-bottom: 11px; }
    .feature-text { font-size: 15px; color: var(--dim); }

    .spotlight { border-radius: 30px; padding: 44px; }
    .spotlight-title { font-weight: 600; margin-bottom: 16px; }
    .spotlight-text { font-size: 16px; color: var(--dim); margin-bottom: 22px; }
    .checks li { font-size: 15px; } .checks .ic { font-size: 20px; color: #7ee8c8; margin-top: 1px; }
    .spotlight-visual { border-radius: 20px; }
    .spotlight-visual .edge { stroke: rgba(170,200,255,.5); }
    .node-a { fill: rgba(120,170,255,.7); } .node-b { fill: rgba(170,107,255,.8); } .node-c { fill: rgba(126,232,200,.75); } .node-d { fill: rgba(255,150,210,.7); } .node-e { fill: rgba(255,212,121,.7); }

    .step { border-radius: 22px; padding: 30px 26px; }
    .step-num { font-size: 13px; font-weight: 700; letter-spacing: .1em; color: #b9d0ff; }
    .step-icon { width: 48px; height: 48px; border-radius: 14px; font-size: 22px; margin: 18px 0 16px; background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.3); }
    .step-title { font-weight: 600; margin-bottom: 9px; }
    .step-text { font-size: 14.5px; color: var(--dim); }

    .stats { border-radius: 28px; padding: 46px; }
    .stat-num { font-weight: 600; background: linear-gradient(120deg, #fff, #a9d2ff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .stat-label { font-size: 13.5px; color: var(--dim); }

    .quote { border-radius: 28px; padding: 50px; }
    .quote-text { font-weight: 500; letter-spacing: -.01em; }
    .quote-avatar { background: linear-gradient(150deg, #6aa9ff, #b06bff); border: 1px solid rgba(255,255,255,.4); }
    .quote-name { font-size: 15px; } .quote-role { font-size: 13px; color: var(--dim); }

    .cta { border-radius: 34px; padding: 70px 30px; }
    .cta-title { font-weight: 600; margin-bottom: 14px; }
    .cta-text { font-size: 18px; color: var(--dim); margin-bottom: 30px; }

    .site-footer { border-top: 1px solid var(--line); padding: 56px 0 30px; }
    .foot-brand .brand { margin-bottom: 14px; }
    .foot-tagline { font-size: 14px; color: var(--dim); max-width: 240px; }
    .foot-col h6 { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--dim); margin-bottom: 16px; }
    .foot-col a { color: rgba(255,255,255,.82); font-size: 14.5px; margin-bottom: 11px; }
    .foot-col a:hover { color: #fff; }
    .foot-bottom { margin-top: 44px; padding-top: 22px; border-top: 1px solid var(--line); font-size: 13px; color: var(--dim); }

    @media (prefers-reduced-motion: reduce) { .bg span { animation: none; } html { scroll-behavior: auto; } }
  </style>
  <script defer src="https://uuu.my-monkey.fr/u.js" data-website-id="6c86cae6-7768-440f-84f7-309411fe825c"></script>
</head>
<body data-style="liquid-glass">
  <script src="../assets/landing.js"></script>
  <script src="../assets/styles-data.js"></script>
  <script src="../assets/hud.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nimbus · Claymorphisme — Morphodex</title>
  <link rel="stylesheet" href="../assets/landing-base.css" />
  <link rel="stylesheet" href="../assets/hud.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ====== PEAU : CLAYMORPHISME ======
       Pâte à modeler : gros, bombé, doux. Ombre extérieure colorée
       + deux ombres internes = volume gonflé, pastel, ludique. */
    :root { --clay: #fdf6ff; --txt: #6a4c7a; --strong: #46295e; --pink: #ff85a1; --violet: #9d7bff; --mint: #45d6bd; --yellow: #ffcb5c; }
    body { font-family: "Fredoka", system-ui, sans-serif; color: var(--txt); background: linear-gradient(140deg, #dcd6ff, #ffe1ec); }
    .bg { display: none; }

    .surface { background: var(--clay); box-shadow: 18px 22px 44px rgba(150,115,200,.4), inset -7px -7px 14px rgba(160,120,200,.2), inset 8px 8px 16px rgba(255,255,255,.95); }

    .nav { padding: 13px 16px; border-radius: 30px; box-shadow: 12px 16px 30px rgba(150,115,200,.35), inset -5px -5px 11px rgba(160,120,200,.18), inset 6px 6px 12px #fff; }
    .brand { font-weight: 600; font-size: 21px; color: var(--strong); }
    .brand-logo { width: 44px; height: 44px; border-radius: 50%; font-size: 20px; color: #fff; background: var(--violet); box-shadow: inset -4px -4px 8px rgba(80,40,140,.35), inset 4px 4px 8px rgba(255,255,255,.5), 5px 6px 12px rgba(157,123,255,.5); }
    .nav-links a { color: var(--txt); font-size: 15px; font-weight: 500; padding: 9px 16px; border-radius: 16px; }
    .nav-links a:hover { background: rgba(157,123,255,.12); }

    .btn { font-weight: 600; font-size: 16px; color: #fff; padding: 15px 28px; border-radius: 22px; background: var(--violet); box-shadow: inset -5px -5px 10px rgba(70,35,130,.35), inset 5px 5px 10px rgba(255,255,255,.5), 9px 11px 22px rgba(157,123,255,.5); transition: transform .14s; }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--pink); box-shadow: inset -5px -5px 10px rgba(170,40,70,.3), inset 5px 5px 10px rgba(255,255,255,.55), 9px 11px 22px rgba(255,133,161,.55); }
    .nav-cta { padding: 11px 22px; font-size: 15px; }

    .eyebrow { font-size: 14px; font-weight: 600; color: var(--strong); padding: 11px 22px; border-radius: 999px; background: var(--yellow); box-shadow: inset -4px -4px 9px rgba(200,150,30,.3), inset 4px 4px 9px rgba(255,255,255,.7), 6px 8px 16px rgba(255,206,92,.5); }
    .hero-title { font-weight: 700; color: var(--strong); }
    .accent { color: var(--pink); }
    .hero-sub, .section-sub { color: var(--txt); font-weight: 400; }
    .hero-trust { color: var(--txt); font-size: 14.5px; }
    .stars .ic { fill: var(--yellow); stroke: #e0a52f; }

    .appwin { border-radius: 32px; }
    .appbar { padding-bottom: 10px; }
    .appbar-dot { box-shadow: inset -1px -1px 2px rgba(160,120,200,.4), inset 1px 1px 2px #fff; background: #efe6f7; }
    .app-addr { font-size: 12px; color: var(--txt); }
    .app-side a { color: var(--txt); font-size: 12.5px; border-radius: 14px; }
    .app-side a.on { color: var(--violet); box-shadow: inset -3px -3px 7px #fff, inset 3px 3px 7px rgba(160,120,200,.25); }
    .app-note { background: #fff; border-radius: 18px; box-shadow: inset -3px -3px 7px rgba(160,120,200,.16), inset 3px 3px 7px #fff, 6px 7px 14px rgba(150,115,200,.22); }
    .app-note[data-tag]::before { content: attr(data-tag); display: inline-block; font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 999px; background: var(--mint); color: #fff; margin-bottom: 7px; }
    .app-note-title { font-size: 13px; font-weight: 600; color: var(--strong); margin-bottom: 3px; }
    .app-note-text { font-size: 11.5px; color: var(--txt); }
    .app-graph .edge { stroke: #c9b6e8; opacity: 1; } .app-graph .node { fill: var(--violet); }

    .trustbar-label { color: var(--txt); font-size: 12px; letter-spacing: .1em; text-transform: uppercase; }
    .trust-logos b { color: #a890c4; font-size: 20px; font-weight: 600; }

    .section-kicker { color: var(--pink); font-weight: 600; }
    .section-title { font-weight: 700; color: var(--strong); }

    .feature { border-radius: 34px; padding: 32px; }
    .feature-icon { width: 70px; height: 70px; border-radius: 24px; font-size: 30px; color: #fff; margin-bottom: 22px; box-shadow: inset -5px -5px 10px rgba(0,0,0,.18), inset 5px 5px 10px rgba(255,255,255,.5), 7px 9px 16px rgba(0,0,0,.12); }
    .feature:nth-child(1) .feature-icon { background: var(--pink); }
    .feature:nth-child(2) .feature-icon { background: var(--mint); }
    .feature:nth-child(3) .feature-icon { background: var(--yellow); }
    .feature-title { font-size: 22px; font-weight: 600; color: var(--strong); margin-bottom: 10px; }
    .feature-text { font-size: 15.5px; color: var(--txt); }

    .spotlight { border-radius: 38px; padding: 44px; }
    .spotlight-title { font-weight: 700; color: var(--strong); margin-bottom: 14px; }
    .spotlight-text { color: var(--txt); margin-bottom: 20px; font-size: 16px; }
    .checks li { color: var(--txt); font-size: 15.5px; } .checks .ic { color: var(--mint); }
    .spotlight-visual { border-radius: 28px; background: #f2ecfb; box-shadow: inset -5px -5px 11px rgba(160,120,200,.18), inset 6px 6px 12px #fff; }
    .spotlight-visual .edge { stroke: #c9b6e8; }
    .node-a { fill: var(--pink); } .node-b { fill: var(--violet); } .node-c { fill: var(--mint); } .node-d { fill: var(--yellow); } .node-e { fill: #ff9ec4; }

    .step { border-radius: 32px; padding: 30px 28px; }
    .step-num { font-size: 12px; font-weight: 600; letter-spacing: .08em; color: var(--pink); }
    .step-icon { width: 56px; height: 56px; border-radius: 20px; font-size: 24px; color: #fff; margin: 16px 0 14px; background: var(--violet); box-shadow: inset -4px -4px 8px rgba(70,35,130,.3), inset 4px 4px 8px rgba(255,255,255,.5), 5px 6px 12px rgba(157,123,255,.4); }
    .step-title { font-size: 20px; font-weight: 600; color: var(--strong); margin-bottom: 9px; }
    .step-text { font-size: 15px; color: var(--txt); }

    .stats { border-radius: 36px; padding: 44px; }
    .stat-num { font-weight: 700; color: var(--violet); }
    .stat-label { font-size: 14px; color: var(--txt); }

    .quote { border-radius: 38px; padding: 50px; }
    .quote-text { font-weight: 500; color: var(--strong); }
    .quote-text .accent { color: var(--violet); }
    .quote-avatar { background: linear-gradient(150deg, var(--pink), var(--violet)); box-shadow: inset -2px -2px 5px rgba(0,0,0,.15), inset 2px 2px 5px rgba(255,255,255,.5); }
    .quote-name { font-size: 16px; color: var(--strong); } .quote-role { font-size: 13px; color: var(--txt); }

    .cta { border-radius: 44px; padding: 62px 30px; }
    .cta-title { font-weight: 700; color: var(--strong); margin-bottom: 14px; }
    .cta-text { font-size: 18px; color: var(--txt); margin-bottom: 30px; }

    .site-footer { margin-top: 54px; }
    .foot-brand .brand { color: var(--strong); margin-bottom: 14px; }
    .foot-tagline { color: var(--txt); font-size: 14px; max-width: 240px; }
    .foot-col h6 { color: var(--strong); font-size: 12px; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 14px; }
    .foot-col a { color: var(--txt); font-size: 14.5px; margin-bottom: 10px; }
    .foot-col a:hover { color: var(--violet); }
    .foot-bottom { color: #a890c4; font-size: 13px; margin-top: 36px; }
  </style>
  <script defer src="https://uuu.my-monkey.fr/u.js" data-website-id="6c86cae6-7768-440f-84f7-309411fe825c" data-domains="morphodex.my-monkey.fr"></script>
</head>
<body data-style="claymorphisme">
  <script src="../assets/landing.js"></script>
  <script src="../assets/styles-data.js"></script>
  <script src="../assets/hud.js"></script>
</body>
</html>
